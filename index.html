<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Responsive Center</title>
    <!-- Link ke Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <!-- Navbar tanpa tombol hamburger dan tanpa collapse -->
            <div class="navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <section class="hero">
            <button type="button" class="btn btn-hero">Button</button>
        </section>

        <div class="slider" id="mySlider">
            <div class="img-slider" style="background-color: lightblue;"></div>
            <div class="img-slider" style="background-color: lightcoral;"></div>
            <div class="img-slider" style="background-color: lightgreen;"></div>
            <div class="img-slider" style="background-color: lightsalmon;"></div>
            <div class="img-slider" style="background-color: lightseagreen;"></div>
            <div class="img-slider" style="background-color: lightskyblue;"></div>
            <div class="img-slider" style="background-color: lightslategray;"></div>
            <div class="img-slider" style="background-color: lightyellow;"></div>
        </div>
    </div>

    <!-- Skrip untuk Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
