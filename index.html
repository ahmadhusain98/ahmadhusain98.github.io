<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Responsive Center</title>
    <!-- Link ke Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>

<style>
    /* Navbar */
.navbar-collapse {
    display: flex;
    justify-content: center;
}

.navbar-nav {
    border-radius: 10px;
    display: flex;
    justify-content: center;
    margin-top: 20px;
    margin-bottom: 20px;
}

.navbar-nav .nav-item {
    margin: 0 5px;
}

.nav-link {
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    width: 100px;
    background-color: #898989;
    color: white;
}

.navbar {
    background-color: #f8f9fa;
    border-radius: 10px;
    padding: 5px 0;
}

.navbar-nav {
    flex-direction: row;
    background-color: #d9d9d9;
    padding: 10px;
}

.navbar-toggler {
    display: none !important;
}

/* Hero Section */
.hero {
    background-color: #d9d9d9;
    width: 100%;
    height: 50vh;  /* Gunakan 50vh agar tinggi responsif terhadap viewport */
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    align-items: center;  /* Vertikal centering */
    position: relative;  /* Untuk memposisikan tombol di dalamnya */
}

/* Button di dalam hero section */
.btn-hero {
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    width: 100px;
    background-color: #898989;
    color: white;
    position: absolute;
    bottom: 20px;  /* Letakkan tombol di bagian bawah hero section */
}

/* Container untuk carousel */
.carousel-container {
    position: relative;
    width: 100%;
    max-width: 800px; /* Menentukan lebar maksimal carousel */
    margin: 0 auto;
    overflow: hidden;  /* Menyembunyikan bagian yang keluar dari carousel */
    background-color: #898989;
    padding: 10px;
    height: auto;
}

/* Wadah carousel yang menampung gambar */
.carousel {
    display: flex;
    transition: transform 0.5s ease-in-out; /* Efek peralihan untuk perpindahan gambar */
    gap: 10px;
}

/* Gambar slider */
.img-slider {
    height: 160px;    /* Tinggi gambar */
    width: 160px;    /* Tinggi gambar */
    background-size: cover;
    background-position: center;
    border-radius: 10px;
}

/* Tombol navigasi (prev dan next) */
.carousel-container>button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rgba(0, 0, 0, 0.1);
    color: white;
    border: none;
    font-size: 10px;
    padding: 10px;
    cursor: pointer;
    border-radius: 50%;
    z-index: 10;
}

button:hover {
    background-color: rgba(0, 0, 0, 0.7);
}

.prev {
    left: 10px;
}

.next {
    right: 10px;
}

@media (max-width: 480px) {
    .navbar-nav {
        border-radius: 10px;
        display: flex;
        justify-content: center;
        margin-top: 10px;
        margin-bottom: 10px;
    }

    .nav-link {
        border-radius: 10px;
        padding: 10px;
        text-align: center;
        width: 63px;
        background-color: #898989;
        color: white;
        font-size: 12px;
    }

    .hero {
        height: 30vh;  /* Mengurangi tinggi hero section pada perangkat lebih kecil (smartphone) */
    }

    .slider {
        grid-template-columns: 1fr;  /* Menampilkan gambar slider dalam satu kolom pada perangkat yang lebih kecil */
    }

    .btn-hero {
        padding: 10px;
        bottom: 10px;
        left: 10px;
        width: 70px;
    }
    
     .carousel-container {
        max-width: 100%;
    }
    
    .img-slider {
        height: 160px;
        min-width: 100%;
        background-size: cover;
        background-position: center;
        border-radius: 10px;
    }
}

/* Responsif untuk tablet dan perangkat lebih kecil */
@media (max-width: 768px) {
    .hero {
        height: 40vh;  /* Menurunkan tinggi hero section pada perangkat dengan layar lebih kecil */
    }

    .slider {
        display: grid;
        grid-template-columns: repeat(2, 1fr);  /* Menampilkan 2 gambar per baris pada layar kecil */
    }

    .img-slider {
        width: 100%;  /* Gambar slider menggunakan 100% lebar container pada layar kecil */
        margin-bottom: 10px;
    }

    .btn-hero {
        width: 80px;  /* Menyesuaikan ukuran tombol pada layar kecil */
    }
}

</style>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <!-- Navbar tanpa tombol hamburger dan tanpa collapse -->
            <div class="navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <section class="hero">
            <button type="button" class="btn btn-hero">Button</button>
        </section>

        <div class="carousel-container">
            <div class="carousel">
                <div class="img-slider" style="background-color: lightblue;"></div>
                <div class="img-slider" style="background-color: lightcoral;"></div>
                <div class="img-slider" style="background-color: lightgreen;"></div>
                <div class="img-slider" style="background-color: lightsalmon;"></div>
                <div class="img-slider" style="background-color: lightseagreen;"></div>
                <div class="img-slider" style="background-color: lightskyblue;"></div>
                <div class="img-slider" style="background-color: lightslategray;"></div>
                <div class="img-slider" style="background-color: lightyellow;"></div>
            </div>
            <!-- Tombol navigasi -->
            <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
            <button class="next" onclick="moveSlide(1)">&#10095;</button>
        </div>

    </div>

    <script>
        let index = 0; // Menyimpan indeks gambar yang sedang ditampilkan
            const slides = document.querySelectorAll('.img-slider'); // Menyimpan semua elemen gambar
            const totalSlides = slides.length;

            // Fungsi untuk menggerakkan carousel
            function moveSlide(step) {
                index += step; // Menambahkan atau mengurangi indeks gambar yang ditampilkan

                // Jika sudah sampai gambar pertama atau terakhir, perulangan akan dimulai lagi
                if (index < 0) {
                    index = totalSlides - 1; // Pindah ke gambar terakhir
                } else if (index >= totalSlides) {
                    index = 0; // Pindah ke gambar pertama
                }

                // Mengubah posisi carousel sesuai dengan gambar yang dipilih
                const carousel = document.querySelector('.carousel');
                carousel.style.transform = `translateX(-${index * 100}%)`;
            }

            // Fungsi untuk otomatis bergerak ke gambar berikutnya setiap 3 detik
            function autoMove() {
                moveSlide(1);
            }

            setInterval(autoMove, 3000); // Setiap 3 detik akan berpindah ke gambar berikutnya

    </script>

    <!-- Skrip untuk Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
